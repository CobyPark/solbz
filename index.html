<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>솔루션 비제트 - 서버 점검 중</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #222;
      color: #fff;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .wrap {
      padding: 40px 20px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #46b0e1;
      letter-spacing: 0.05em;
      margin-bottom: 50px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #fff;
    }
    .desc {
      font-size: 1.1rem;
      color: #aaa;
      line-height: 1.8;
      margin-bottom: 40px;
    }
    .time-box {
      display: inline-block;
      background-color: #333;
      border: 1px solid #46b0e1;
      border-radius: 8px;
      padding: 20px 40px;
      margin-bottom: 40px;
    }
    .time-label {
      font-size: 0.9rem;
      color: #46b0e1;
      margin-bottom: 8px;
    }
    .time-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }
    .footer {
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Solution BZ</div>
    <div class="icon">🔧</div>
    <h1>서버 점검 중입니다</h1>
    <p class="desc">
      더 나은 서비스 제공을 위해 시스템 점검을 진행 중입니다.<br>
      이용에 불편을 드려 죄송합니다.
    </p>
    <div class="time-box">
      <div class="time-label">점검 종료 예정</div>
      <div class="time-value">2026년 7월 6일 (일) 오후 2시</div>
    </div>
    <p class="footer">문의: 솔루션 비제트</p>
  </div>
</body>
</html>
